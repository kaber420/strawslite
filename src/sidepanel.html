<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Straws Lite</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="app-container">
    <header class="header glass">
      <div class="header-left">
        <h1 class="logo">🥤 Straws <span>Lite</span></h1>
      </div>
      <div class="header-right">
        <div class="header-toggles">
          <label class="switch-container tooltip" data-tooltip="Straws Engine (Go)">
            <span class="switch-label">GO</span>
            <label class="switch mini">
              <input type="checkbox" id="engine-switch">
              <span class="slider round"></span>
            </label>
          </label>
          <label class="switch-container tooltip" data-tooltip="Master Switch">
            <span class="switch-label">MASTER</span>
            <label class="switch mini">
              <input type="checkbox" id="master-switch" checked>
              <span class="slider round"></span>
            </label>
          </label>
        </div>
      </div>
    </header>

    <div class="toolbar">
      <button id="add-rule-btn" class="btn primary">Add Straw</button>
      <div class="toolbar-actions">
        <button id="import-btn" class="btn secondary">Import</button>
        <button id="export-btn" class="btn secondary">Export</button>
        <input type="file" id="import-file" accept=".json" style="display: none;">
      </div>
    </div>

    <section class="rules-section">
      <h2 class="section-title">Active Rules</h2>
      <div id="rules-list" class="rules-list empty">
        <!-- Rules will be injected here -->
      </div>
    </section>

    <section class="terminal-section">
      <div class="terminal-header">
        <div style="display: flex; align-items: center; gap: 10px;">
          <span>Real-time Logs</span>
          <button id="toggle-livelog-btn" class="btn" style="padding: 2px 8px; font-size: 0.8rem; border-radius: 4px; border: 1px solid var(--border-light); background: var(--bg-surface); cursor: pointer; color: var(--text-main);">▶ Start (5m)</button>
        </div>
        <button id="clear-logs-btn" class="btn-icon" title="Clear Logs">🗑️</button>
      </div>
      <div class="terminal-body">
        <div class="terminal-window" id="terminal-output">
          <div class="terminal-content">
            <span class="log info">System initialized. Live Log is OFF.</span>
          </div>
        </div>
        <!-- Log Detail Overlay -->
        <div id="log-overlay" class="log-overlay">
          <div class="log-overlay-header">
            <span class="log-overlay-title">Log Details</span>
            <button class="log-overlay-close" id="close-log-overlay">&times;</button>
          </div>
          <div id="log-overlay-content" class="log-overlay-content">
            <!-- Details will be injected here -->
          </div>
        </div>
      </div>
    </section>

    <!-- Add/Edit Modal -->
    <div id="rule-modal" class="modal hidden">
      <div class="modal-content glass">
        <h3 id="modal-title">Add Rule</h3>
        <form id="rule-form">
          <input type="hidden" id="rule-id">
          <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label for="rule-source">Source Domain</label>
              <span id="cert-status-badge" class="cert-status hidden"></span>
            </div>
            <input type="text" id="rule-source" placeholder="e.g. myapi.dev" required>
          </div>
          <div class="form-group">
            <label for="rule-dest">Destination</label>
            <input type="text" id="rule-dest" placeholder="e.g. localhost:3000" required>
          </div>
          <div class="form-group">
            <label>Mode</label>
            <div class="mode-selector">
              <label class="mode-option">
                <input type="radio" name="rule-type" value="redirect" checked>
                <div class="mode-card">
                  <span class="mode-icon">🔄</span>
                  <div class="mode-details">
                    <span class="mode-name">DNR Redirect</span>
                    <span class="mode-desc">Cambia la URL (visible)</span>
                  </div>
                </div>
              </label>
              <label class="mode-option">
                <input type="radio" name="rule-type" value="engine">
                <div class="mode-card">
                  <span class="mode-icon">🚀</span>
                  <div class="mode-details">
                    <span class="mode-name">Straws Engine</span>
                    <span class="mode-desc">Reverse Proxy (HTTPS)</span>
                  </div>
                </div>
              </label>
              <label class="mode-option">
                <input type="radio" name="rule-type" value="passthrough">
                <div class="mode-card">
                  <span class="mode-icon">🛰️</span>
                  <div class="mode-details">
                    <span class="mode-name">Passthrough</span>
                    <span class="mode-desc">Simple TCP Tunnel</span>
                  </div>
                </div>
              </label>
            </div>
          </div>
          <div id="engine-options" class="form-group hidden">
            <label for="rule-cert">Certificate (Legal Domain)</label>
            <select id="rule-cert">
              <option value="">Auto-select (by hostname)</option>
            </select>
            <span class="help-text">Drop .crt/.key in the /certs folder of the engine</span>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn secondary" id="cancel-rule-btn">Cancel</button>
            <button type="submit" class="btn primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="js/monitor.js"></script>
  <script type="module" src="js/app.js"></script>
</body>

</html>
